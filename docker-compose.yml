services:
  postgres:
    image: postgres:16-bookworm
    container_name: netup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: netup
      POSTGRES_USER: netup
      POSTGRES_PASSWORD: netup
    ports:
      - "${POSTGRES_HOST_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netup -d netup"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-bookworm
    container_name: netup-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_BIND:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: netup-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_HOST_BIND:-0.0.0.0}:${ADMINER_HOST_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  backend-api:
    build:
      context: ./backend
    container_name: netup-backend-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      CORS_ORIGINS: "${CORS_ORIGINS:-http://netup.io.vn,http://13.251.104.233}"
      FRONTEND_BASE_URL: "${PUBLIC_BASE_URL:-http://netup.io.vn}"
      BACKEND_BASE_URL: "${PUBLIC_BASE_URL:-http://netup.io.vn}"
      GOOGLE_REDIRECT_URI: "${PUBLIC_BASE_URL:-http://netup.io.vn}/api/v1/auth/google/callback"
      VNPAY_RETURN_URL: "${PUBLIC_BASE_URL:-http://netup.io.vn}/api/v1/payments/vnpay/return"
    ports:
      - "${BACKEND_HOST_BIND:-127.0.0.1}:${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    entrypoint: >
      sh -c "
      echo 'Running database migrations...' &&
      alembic upgrade head &&
      echo 'Seeding development admin if enabled...' &&
      python -m app.scripts.seed_admin &&
      echo 'Importing bulk users if enabled...' &&
      python -m app.scripts.import_users &&
      echo 'Starting NetUp API...' &&
      exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:22-bookworm
    container_name: netup-frontend
    working_dir: /app
    restart: unless-stopped
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-}"
      NEXT_PUBLIC_NETUP_FACEBOOK_URL: "${NEXT_PUBLIC_NETUP_FACEBOOK_URL:-https://www.facebook.com/netup.vn}"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    command: >
      sh -c "corepack enable &&
      corepack prepare pnpm@11.2.2 --activate &&
      pnpm install --frozen-lockfile &&
      tail -f /dev/null"

  nginx:
    build:
      context: .
      dockerfile: ./ops/production/nginx/Dockerfile
    container_name: netup-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
    volumes:
      - ./ops/production/nginx/netup-static.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/var/www/frontend:ro
    depends_on:
      frontend:
        condition: service_started
      backend-api:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  frontend-node-modules:
