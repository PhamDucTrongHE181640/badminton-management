services:
  node24:
    image: node:24-bookworm
    container_name: node24
    working_dir: /app
    stdin_open: true
    tty: true
    environment:
      - COREPACK_ENABLE_DOWNLOAD_PROMPT=0
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "corepack enable && corepack prepare pnpm@11.2.2 --activate && pnpm dev --hostname 0.0.0.0 --port 3000"
