services:
  postgres:
    image: postgres:16-bookworm
    container_name: netup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: netup
      POSTGRES_USER: netup
      POSTGRES_PASSWORD: netup
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netup -d netup"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-bookworm
    container_name: netup-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: netup-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_HOST_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  backend-api:
    build:
      context: ./backend
    container_name: netup-backend-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      CORS_ORIGINS: "${PUBLIC_BASE_URL:-http://localhost:3000}"
      FRONTEND_BASE_URL: "${PUBLIC_BASE_URL:-http://localhost:3000}"
      BACKEND_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}"
      GOOGLE_REDIRECT_URI: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}/api/v1/auth/google/callback"
      VNPAY_RETURN_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}/api/v1/payments/vnpay/return"
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    entrypoint: >
      sh -c "
      echo 'Running database migrations...' &&
      alembic upgrade head &&
      echo 'Seeding development admin if enabled...' &&
      python -m app.scripts.seed_admin &&
      echo 'Starting NetUp API...' &&
      exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:22-bookworm
    container_name: netup-frontend
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}"
      NEXT_PUBLIC_NETUP_FACEBOOK_URL: "${NEXT_PUBLIC_NETUP_FACEBOOK_URL:-https://www.facebook.com/netup.vn}"
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    command: >
      sh -c "rm -rf /app/.next &&
      corepack enable &&
      corepack prepare pnpm@11.2.2 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm dev --hostname 0.0.0.0 --port 3000"
    depends_on:
      backend-api:
        condition: service_started

  nginx:
    build:
      context: .
      dockerfile: ./ops/production/nginx/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-}"
        NEXT_PUBLIC_NETUP_FACEBOOK_URL: "${NEXT_PUBLIC_NETUP_FACEBOOK_URL:-https://www.facebook.com/netup.vn}"
    container_name: netup-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
    depends_on:
      backend-api:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  frontend-node-modules:
